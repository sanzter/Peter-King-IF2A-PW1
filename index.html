<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembelajaran Web</title>
</head>
<body>
    <h2>Rowspan</h2>
    <table border="1">
        <!-- Baris Pertama -->
        <th rowspan="3">NPM</th>
        <tr>
            <td>Nama</td>
        </tr>
        <!-- Baris Kedua -->
        <tr>
            <td>ABC</td>
        </tr>
    </table>

    <h2>Colspan</h2>
    <table border="1">
        <!-- Baris Pertama -->
        <th colspan="2">NPM</th>
        <tr>
            <td>001</td>
            <td>ABC</td>
        </tr>
        <!-- Baris Kedua -->
    </table>

    <h2>Colspan dan Rowspan</h2>
    <table border="1">
        <!-- Baris Pertama -->
        <tr>
            <th rowspan="2">Logo</th>
            <th rowspan="2" style="text-align: center;"><b>Prodi</b></th>
            <th colspan="2"><b>Jumlah</b></th>
            
        </tr>
        <!-- Baris Kedua -->
        <tr>
            <td><b>LK</b></td>
            <td><b>PR</b></td>
        </tr>
        <!-- Baris Ketiga -->
        <tr>
            <td>
                <img src="Images/discord.png" width="70px" alt="">
            </td>
            <td>Informatika</td>
            <td>100</td>
            <td>105</td>
        </tr>
        <!-- Baris KeEmpat -->
        <tr>
            <td>
                <img src="Images/gopay.png" width="70px" alt="">
            </td>
            <td>Sistem Informasi</td>
            <td>150</td>
            <td>120</td>
        </tr>

    </table>
    <hr>
    <!-- Link -->
    <a href="profil.html">Profil</a>
</body>
</html>
